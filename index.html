<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#070b14" />

<title>Institutional Trading Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

:root{
    --bg:#070b14;
    --card:#111827cc;
    --border:#33415555;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#818cf8;
    --text:#f1f5f9;
    --muted:#94a3b8;
}

body{
    background:
        radial-gradient(circle at top left,#172554 0%,transparent 30%),
        radial-gradient(circle at bottom right,#064e3b 0%,transparent 30%),
        var(--bg);

    color:var(--text);

    font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;

    padding:16px;
    min-height:100vh;
}

.container{
    max-width:720px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:24px;
}

.header h1{
    font-size:2rem;
    font-weight:800;

    background:linear-gradient(
        135deg,
        #22c55e,
        #818cf8,
        #38bdf8
    );

    -webkit-background-clip:text;
    color:transparent;
}

.header p{
    color:var(--muted);
    margin-top:8px;
    font-size:0.95rem;
}

.index-tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    scrollbar-width:none;
    margin-bottom:20px;
}

.index-tabs::-webkit-scrollbar{
    display:none;
}

.tab{
    padding:12px 20px;
    border-radius:999px;

    background:rgba(15,23,42,0.7);

    border:1px solid var(--border);

    cursor:pointer;

    transition:0.25s ease;

    white-space:nowrap;

    font-weight:600;

    color:#cbd5e1;

    backdrop-filter:blur(12px);
}

.tab:hover{
    transform:translateY(-2px);
}

.tab.active{
    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;
    border-color:#22c55e;
    box-shadow:0 0 20px #22c55e55;
}

.chart-container{
    border-radius:28px;
    overflow:hidden;
    margin-bottom:20px;

    border:1px solid var(--border);

    box-shadow:
        0 8px 30px rgba(0,0,0,0.4);

    background:#131722;
}

.price-card{
    background:var(--card);

    backdrop-filter:blur(16px);

    border:1px solid var(--border);

    padding:24px;

    border-radius:28px;

    margin-bottom:20px;

    text-align:center;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.25);
}

.price-title{
    color:var(--muted);
    font-size:0.85rem;
    letter-spacing:1px;
}

.live-price{
    font-size:3rem;
    font-weight:800;

    margin-top:10px;

    font-family:
        'SF Mono',
        monospace;

    letter-spacing:-1px;
}

.market-status{
    margin-top:12px;

    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:8px 14px;

    border-radius:999px;

    background:#052e16;

    color:#4ade80;

    font-size:0.8rem;

    font-weight:600;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
}

.sentiment{
    margin-top:16px;
    font-size:1rem;
    font-weight:700;
}

.manual-input{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:22px;
    flex-wrap:wrap;
}

.manual-input input{
    padding:14px 18px;

    border-radius:999px;

    border:1px solid #334155;

    background:#0f172a;

    color:white;

    width:170px;

    text-align:center;

    outline:none;

    transition:0.25s;
}

.manual-input input:focus{
    border-color:#818cf8;
    box-shadow:0 0 0 4px #818cf833;
}

.manual-input button{
    padding:14px 20px;

    border:none;

    border-radius:999px;

    background:linear-gradient(
        135deg,
        #818cf8,
        #6366f1
    );

    color:white;

    cursor:pointer;

    font-weight:700;

    transition:0.25s ease;
}

.manual-input button:hover{
    transform:translateY(-2px);
    opacity:0.95;
}

.card{
    background:var(--card);

    backdrop-filter:blur(16px);

    border-radius:28px;

    border:1px solid var(--border);

    margin-bottom:18px;

    overflow:hidden;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.25);
}

.card-header{
    padding:18px 22px;

    background:rgba(0,0,0,0.25);

    font-weight:800;

    border-bottom:1px solid #33415555;

    font-size:1rem;
}

.card-body{
    padding:20px 22px;
}

.level-item{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 0;

    border-bottom:1px dashed #33415555;
}

.level-item:last-child{
    border-bottom:none;
}

.level-item span:first-child{
    color:var(--muted);
}

.level-value{
    font-family:monospace;
    font-size:1rem;
    font-weight:700;
}

.green{
    color:var(--green);
}

.red{
    color:var(--red);
}

.metrics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:18px;
}

.metric-box{
    background:#0f172a;

    border:1px solid #1e293b;

    border-radius:20px;

    padding:18px;

    text-align:center;
}

.metric-label{
    color:var(--muted);
    font-size:0.8rem;
}

.metric-value{
    margin-top:8px;
    font-size:1.4rem;
    font-weight:800;
}

.footer{
    text-align:center;
    margin-top:24px;

    color:#64748b;

    font-size:0.75rem;

    line-height:1.6;
}

.loading{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:0.5}
    50%{opacity:1}
    100%{opacity:0.5}
}

@media(max-width:640px){

    .live-price{
        font-size:2.4rem;
    }

    .metrics-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useEffect, useCallback } = React;

const INDICES = {
    NIFTY: {
        tv: "NSE:NIFTY",
        yahoo: "^NSEI",
        name: "🇮🇳 NIFTY"
    },

    SENSEX: {
        tv: "BSE:SENSEX",
        yahoo: "^BSESN",
        name: "📈 SENSEX"
    },

    BANKNIFTY: {
        tv: "NSE:BANKNIFTY",
        yahoo: "^NSEBANK",
        name: "🏦 BANK NIFTY"
    }
};

function loadTradingView(containerId, symbol){

    const container = document.getElementById(containerId);

    if(!container) return;

    container.innerHTML = "";

    function createWidget(){

        if(!window.TradingView){
            setTimeout(createWidget,500);
            return;
        }

        new TradingView.widget({
            autosize:true,
            symbol:symbol,
            interval:"15",
            timezone:"Asia/Kolkata",
            theme:"dark",
            style:"1",
            locale:"en",
            toolbar_bg:"#131722",
            enable_publishing:false,
            allow_symbol_change:false,
            container_id:containerId,
            studies:[
                "RSI@tv-basicstudies",
                "MACD@tv-basicstudies",
                "BB@tv-basicstudies"
            ]
        });
    }

    if(!document.querySelector("#tradingview-script")){

        const script=document.createElement("script");

        script.id="tradingview-script";

        script.src="https://s3.tradingview.com/tv.js";

        script.onload=createWidget;

        document.head.appendChild(script);

    } else {

        createWidget();
    }
}

async function fetchPrice(symbol){

    try{

        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}`;

        const response=await fetch(url);

        const data=await response.json();

        let price = null;

        if(
            data &&
            data.chart &&
            data.chart.result &&
            data.chart.result[0] &&
            data.chart.result[0].meta
        ){
            price = data.chart.result[0].meta.regularMarketPrice;
        }

        return price || null;

    }catch(err){

        console.log(err);

        return null;
    }
}

function generateAnalysis(price){

    const bullish = price > 20000;

    return {

        resistance1:Math.round(price+50),
        support1:Math.round(price-50),
        target:Math.round(price+120),
        stoploss:Math.round(price-80),
        sentiment:bullish ? "BULLISH" : "BEARISH",
        trendStrength:bullish ? "78%" : "43%",
        volatility:bullish ? "MEDIUM" : "HIGH"

    };
}

function Dashboard(){

    const [selected,setSelected]=useState("NIFTY");

    const [price,setPrice]=useState(0);

    const [manual,setManual]=useState("");

    const [loading,setLoading]=useState(false);

    const [lastUpdate,setLastUpdate]=useState("");

    const current=INDICES[selected];

    const analysis=generateAnalysis(price);

    const loadPrice=useCallback(async()=>{

        setLoading(true);

        const p=await fetchPrice(current.yahoo);

        if(p){
            setPrice(Math.round(p));
        }

        setLastUpdate(new Date().toLocaleTimeString());

        setLoading(false);

    },[current]);

    useEffect(()=>{

        loadTradingView("tv_chart",current.tv);

    },[current]);

    useEffect(()=>{

        loadPrice();

        const interval=setInterval(loadPrice,60000);

        return ()=>clearInterval(interval);

    },[loadPrice]);

    function handleManual(){

        const p=parseFloat(manual);

        if(!isNaN(p)){
            setPrice(p);
        }
    }

    return (

        <div className="container">

            <div className="header">
                <h1>Institutional Dashboard</h1>
                <p>TradingView + Smart Money Concepts + Live Analysis</p>
            </div>

            <div className="index-tabs">

                {Object.keys(INDICES).map(key=>(

                    <div
                        key={key}
                        className={`tab ${selected===key ? "active":""}`}
                        onClick={()=>setSelected(key)}
                    >
                        {INDICES[key].name}
                    </div>

                ))}

            </div>

            <div className="chart-container">
                <div id="tv_chart" style={{height:"420px"}}></div>
            </div>

            <div className="price-card">

                <div className="price-title">
                    LIVE MARKET PRICE
                </div>

                <div className={`live-price ${loading ? "loading" : ""}`}>
                    ₹ {price.toLocaleString("en-IN")}
                </div>

                <div className="market-status">
                    <div className="dot"></div>
                    MARKET OPEN
                </div>

                <div
                    className={`sentiment ${
                        analysis.sentiment==="BULLISH"
                        ? "green"
                        : "red"
                    }`}
                >
                    {analysis.sentiment}
                </div>

                <div className="manual-input">

                    <input
                        type="number"
                        placeholder="Manual Price"
                        value={manual}
                        onChange={(e)=>setManual(e.target.value)}
                    />

                    <button onClick={handleManual}>
                        Set Price
                    </button>

                    <button onClick={loadPrice}>
                        Refresh
                    </button>

                </div>

                <div style={{
                    marginTop:"10px",
                    color:"#64748b",
                    fontSize:"0.75rem"
                }}>
                    Updated: {lastUpdate}
                </div>

            </div>

            <div className="metrics-grid">

                <div className="metric-box">
                    <div className="metric-label">
                        VOLATILITY
                    </div>

                    <div className="metric-value red">
                        {analysis.volatility}
                    </div>
                </div>

                <div className="metric-box">
                    <div className="metric-label">
                        TREND STRENGTH
                    </div>

                    <div className="metric-value green">
                        {analysis.trendStrength}
                    </div>
                </div>

            </div>

            <div className="card">

                <div className="card-header">
                    📊 Trade Setup
                </div>

                <div className="card-body">

                    <div className="level-item">
                        <span>Resistance</span>
                        <span className="level-value green">
                            {analysis.resistance1}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Support</span>
                        <span className="level-value red">
                            {analysis.support1}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Target</span>
                        <span className="level-value green">
                            {analysis.target}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Stop Loss</span>
                        <span className="level-value red">
                            {analysis.stoploss}
                        </span>
                    </div>

                </div>

            </div>

            <div className="footer">
                Institutional Trading Dashboard<br/>
                TradingView + Yahoo Finance Data<br/>
                Educational Purpose Only
            </div>

        </div>
    );
}

const root = ReactDOM.createRoot(
    document.getElementById("root")
);

root.render(<Dashboard />);

</script>

</body>
</html>
