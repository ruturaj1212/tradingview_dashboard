<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />

<title>Institutional Trading Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0a0e1a,#0f172a);
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    padding:16px;
}

.container{
    max-width:700px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2rem;
    background:linear-gradient(90deg,#22c55e,#818cf8);
    -webkit-background-clip:text;
    color:transparent;
}

.index-tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-bottom:20px;
}

.tab{
    padding:10px 18px;
    border-radius:999px;
    background:#1e293b;
    cursor:pointer;
    white-space:nowrap;
    border:1px solid #334155;
}

.tab.active{
    background:#22c55e;
    border-color:#22c55e;
}

.chart-container{
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.price-card{
    background:#111827;
    border:1px solid #334155;
    padding:20px;
    border-radius:24px;
    margin-bottom:20px;
    text-align:center;
}

.live-price{
    font-size:2.4rem;
    font-weight:bold;
    margin-top:10px;
    font-family:monospace;
}

.manual-input{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:15px;
    flex-wrap:wrap;
}

.manual-input input{
    padding:12px;
    border-radius:999px;
    border:none;
    background:#0f172a;
    color:white;
    width:150px;
    text-align:center;
}

.manual-input button{
    padding:12px 18px;
    border:none;
    border-radius:999px;
    background:#818cf8;
    color:white;
    cursor:pointer;
}

.card{
    background:#111827;
    border-radius:20px;
    border:1px solid #334155;
    margin-bottom:16px;
    overflow:hidden;
}

.card-header{
    padding:14px 18px;
    background:#0f172a;
    font-weight:bold;
    border-bottom:1px solid #334155;
}

.card-body{
    padding:18px;
}

.level-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px dashed #334155;
}

.level-value{
    font-family:monospace;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#64748b;
    font-size:0.75rem;
}

.loading{
    color:#22c55e;
}
</style>
</head>

<body>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState, useEffect, useCallback } = React;

const INDICES = {
    NIFTY: {
        tv: "NSE:NIFTY",
        yahoo: "^NSEI",
        name: "🇮🇳 NIFTY"
    },

    SENSEX: {
        tv: "BSE:SENSEX",
        yahoo: "^BSESN",
        name: "📈 SENSEX"
    },

    BANKNIFTY: {
        tv: "NSE:BANKNIFTY",
        yahoo: "^NSEBANK",
        name: "🏦 BANK NIFTY"
    }
};

function loadTradingView(containerId, symbol){

    const container = document.getElementById(containerId);

    if(!container) return;

    container.innerHTML = "";

    function createWidget(){

        if(!window.TradingView){
            setTimeout(createWidget,500);
            return;
        }

        new TradingView.widget({
            autosize:true,
            symbol:symbol,
            interval:"15",
            timezone:"Asia/Kolkata",
            theme:"dark",
            style:"1",
            locale:"en",
            toolbar_bg:"#131722",
            enable_publishing:false,
            allow_symbol_change:false,
            container_id:containerId,
            studies:[
                "RSI@tv-basicstudies",
                "MACD@tv-basicstudies",
                "BB@tv-basicstudies"
            ]
        });
    }

    if(!document.querySelector("#tradingview-script")){

        const script=document.createElement("script");

        script.id="tradingview-script";

        script.src="https://s3.tradingview.com/tv.js";

        script.onload=createWidget;

        document.head.appendChild(script);

    } else {

        createWidget();
    }
}

async function fetchPrice(symbol){

    try{

        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}`;

        const response=await fetch(url);

        const data=await response.json();

        return data?.chart?.result?.[0]?.meta?.regularMarketPrice || null;

    }catch(err){

        console.log(err);

        return null;
    }
}

function generateAnalysis(price){

    return {

        resistance1:Math.round(price+50),
        support1:Math.round(price-50),
        target:Math.round(price-120),
        stoploss:Math.round(price+80),
        sentiment:price % 2 === 0 ? "BEARISH" : "BULLISH"

    };
}

function Dashboard(){

    const [selected,setSelected]=useState("NIFTY");

    const [price,setPrice]=useState(0);

    const [manual,setManual]=useState("");

    const [loading,setLoading]=useState(false);

    const [lastUpdate,setLastUpdate]=useState("");

    const current=INDICES[selected];

    const analysis=generateAnalysis(price);

    const loadPrice=useCallback(async()=>{

        setLoading(true);

        const p=await fetchPrice(current.yahoo);

        if(p){
            setPrice(Math.round(p));
        }

        setLastUpdate(new Date().toLocaleTimeString());

        setLoading(false);

    },[current]);

    useEffect(()=>{

        loadTradingView("tv_chart",current.tv);

    },[current]);

    useEffect(()=>{

        loadPrice();

        const interval=setInterval(loadPrice,60000);

        return ()=>clearInterval(interval);

    },[loadPrice]);

    function handleManual(){

        const p=parseFloat(manual);

        if(!isNaN(p)){
            setPrice(p);
        }
    }

    return (

        <div className="container">

            <div className="header">
                <h1>Institutional Dashboard</h1>
                <p>TradingView + Live Analysis</p>
            </div>

            <div className="index-tabs">

                {Object.keys(INDICES).map(key=>(

                    <div
                        key={key}
                        className={`tab ${selected===key ? "active":""}`}
                        onClick={()=>setSelected(key)}
                    >
                        {INDICES[key].name}
                    </div>

                ))}

            </div>

            <div className="chart-container">
                <div id="tv_chart" style={{height:"420px"}}></div>
            </div>

            <div className="price-card">

                <div>LIVE PRICE</div>

                <div className="live-price">
                    {loading ? "Loading..." : `₹ ${price.toLocaleString("en-IN")}`}
                </div>

                <div style={{
                    color:analysis.sentiment==="BULLISH"
                    ? "#22c55e"
                    : "#ef4444",
                    marginTop:"8px"
                }}>
                    {analysis.sentiment}
                </div>

                <div className="manual-input">

                    <input
                        type="number"
                        placeholder="Manual Price"
                        value={manual}
                        onChange={(e)=>setManual(e.target.value)}
                    />

                    <button onClick={handleManual}>
                        Set Price
                    </button>

                    <button onClick={loadPrice}>
                        Refresh
                    </button>

                </div>

                <div style={{
                    marginTop:"10px",
                    color:"#64748b",
                    fontSize:"0.75rem"
                }}>
                    Updated: {lastUpdate}
                </div>

            </div>

            <div className="card">

                <div className="card-header">
                    Trade Setup
                </div>

                <div className="card-body">

                    <div className="level-item">
                        <span>Resistance</span>
                        <span className="level-value">
                            {analysis.resistance1}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Support</span>
                        <span className="level-value">
                            {analysis.support1}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Target</span>
                        <span className="level-value">
                            {analysis.target}
                        </span>
                    </div>

                    <div className="level-item">
                        <span>Stop Loss</span>
                        <span className="level-value">
                            {analysis.stoploss}
                        </span>
                    </div>

                </div>

            </div>

            <div className="footer">
                Educational Purpose Only
            </div>

        </div>
    );
}

const root = ReactDOM.createRoot(
    document.getElementById("root")
);

root.render(<Dashboard />);

</script>

</body>
</html>
